services:
  api:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/app/data/dermtrack.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "3001:3001"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CERT_PATH}:/etc/nginx/certs:ro
      - ${CERT_APP_PATH}:/etc/nginx/certs-app:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - api
